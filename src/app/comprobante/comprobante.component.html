<mat-card class="example-card" appearance="outlined">
  <mat-card-content>
    @if (status() === "loading") {
      <!-- Loading -->
      <div
        class="d-flex flex-column align-items-center justify-content-center py-5 text-center gap-3"
      >
        <div class="icon-container loading">
          <mat-icon class="spinner"> autorenew </mat-icon>
        </div>

        <div>
          <h2 class="h5 fw-bold">Activando tu tarjeta…</h2>

          <p class="text-muted small mb-0">Esto puede tomar unos segundos.</p>
        </div>
      </div>
    }
    @if (status() === "success") {
      <!-- Success -->
      <div
        class="d-flex flex-column align-items-center justify-content-center py-5 text-center gap-4"
      >
        <div class="status-icon success">
          <mat-icon> check_circle </mat-icon>
        </div>

        <div>
          <h2 class="h4 fw-bold">¡Tarjeta activada!</h2>

          <p class="text-muted small">
            Ya puedes comenzar a usar tu nueva tarjeta digital Nova Pay.
          </p>
        </div>

        <button
          mat-flat-button
          color="primary"
          class="w-100"
          style="max-width: 320px"
          (click)="irAlInicio()"
        >
          Ir al inicio
        </button>
      </div>
    }
  </mat-card-content>
</mat-card>
