<mat-card class="example-card" appearance="outlined">
  <mat-card-header>
    <mat-card-title-group>
      <mat-card-title>Datos personales</mat-card-title>
      <mat-card-subtitle
        >Necesitamos algunos datos para crear tu tarjeta.
      </mat-card-subtitle>
    </mat-card-title-group>
  </mat-card-header>
  <mat-card-content>
    <div class="row">
      <div class="col-12 col-lg-6">
        <mat-form-field appearance="outline">
          <mat-label>Nombre</mat-label>
          <input matInput />
        </mat-form-field>
      </div>
      <div class="col-12 col-lg-6">
        <mat-form-field appearance="outline">
          <mat-label>Apellido</mat-label>
          <input matInput />
        </mat-form-field>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <mat-form-field appearance="outline">
          <mat-label>rut</mat-label>
          <input matInput />
        </mat-form-field>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <mat-form-field appearance="outline">
          <mat-label>Correo electrónico</mat-label>
          <input matInput />
        </mat-form-field>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <mat-form-field appearance="outline">
          <mat-label>Teléfono</mat-label>
          <input matInput />
        </mat-form-field>
      </div>
    </div>
    <div class="row">
      <div class="col-12 col-lg-6">
        <mat-form-field appearance="outline">
          <mat-label>Región</mat-label>
          <mat-select>
            <mat-option value="one">First option</mat-option>
            <mat-option value="two">Second option</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
      <div class="col-12 col-lg-6">
        <mat-form-field appearance="outline">
          <mat-label>Comuna</mat-label>
          <mat-select>
            <mat-option value="one">First option</mat-option>
            <mat-option value="two">Second option</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <mat-form-field appearance="outline">
          <mat-label>Dirección</mat-label>
          <input matInput />
        </mat-form-field>
      </div>
    </div>
    <div class="row">
      <div class="col-12">
        <button
          mat-flat-button
          color="primary"
          class="w-100"
          (click)="continuar()"
        >
          Continuar
          <lucide-icon [img]="ArrowRight" [size]="18" [strokeWidth]="2">
          </lucide-icon>
        </button>
      </div>
    </div>
  </mat-card-content>
</mat-card>
