<main class="onboarding-page">
  <!-- Background glow -->
  <!-- <div class="background-glow"></div> -->
  <div class="container">
    <div class="row">
      <div class="col-12 col-md-8 offset-md-2 col-lg-6 offset-lg-3">
        <!-- HEADER -->
        <header class="header mt-4">
          <div class="logo">
            <lucide-icon
              [img]="CreditCard"
              size="18"
              class="logo-icon"
              strokeWidth="1.8"
            >
            </lucide-icon>
            <!-- <mat-icon class="logo-icon"> auto_awesome </mat-icon> -->
          </div>

          <h3 class="brand mb-0">Tarjeta Digital</h3>
        </header>
        @if (!isComprobante) {
          <div class="d-flex justify-content-between align-items-center mb-3">
            <p>Paso {{ currentStep() }} de 3</p>
            <div class="step-indicator py-1 px-3 rounded-pill fw-bold">
              <span>{{ stepTitle() }}</span>
            </div>
          </div>

          <mat-progress-bar
            mode="determinate"
            [value]="progress()"
          ></mat-progress-bar>
        }
        <div class="liquid-card px-1 py-3">
          <!-- PROGRESS -->
          <div class="row d-flex justify-content-center">
            @if (!isComprobante) {
              <div class="col-12 mb-4 mt-2 d-flex justify-content-center">
                <app-card></app-card>
              </div>
            }
            <div class="col-12">
              <!-- MAIN CONTENT -->
              <section>
                <router-outlet></router-outlet>
              </section>
            </div>
          </div>

          <!-- CARD PREVIEW -->
          <div class="">
            <!-- <app-card-preview [displayName]="fullName" [amount]="amount">
            </app-card-preview> -->
          </div>
        </div>

        <!-- FOOTER -->
        <footer class="footer">
          © {{ currentYear }} Tarjeta digital Angular 19 · Chile
        </footer>
      </div>
    </div>
  </div>
</main>
