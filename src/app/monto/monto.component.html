<mat-card class="example-card" appearance="outlined">
  <mat-card-header>
    <mat-card-title-group>
      <mat-card-title>Monto inicial</mat-card-title>
      <mat-card-subtitle
        >Elige cuánto cargar a tu tarjeta para empezar.
      </mat-card-subtitle>
    </mat-card-title-group>
  </mat-card-header>
  <mat-card-content>
    <div class="row py-5">
      <div class="col-12">
        @for (option of options; track option.value) {
          <button
            mat-stroked-button
            color="primary"
            class="option-card"
            [class.active]="selectedOption() === option.value"
            (click)="selectOption(option.value)"
          >
            {{ option.label }}
          </button>
        }
      </div>
    </div>
    <div class="row pb-5">
      <div class="col-12">
        <mat-form-field appearance="outline">
          <mat-label>Cantidad</mat-label>
          <input matInput type="number" min="0" max="120" step="1" />
          <mat-hint>Mínimo $5.000 — Máximo $2.000.000</mat-hint>
        </mat-form-field>
      </div>
    </div>
    <div class="row">
      <div class="col-6">
        <button mat-stroked-button color="primary">Atrás</button>
      </div>
      <div class="col-6">
        <button
          mat-flat-button
          class="w-100"
          color="primary"
          (click)="continuar()"
        >
          Continuar
        </button>
      </div>
    </div>
  </mat-card-content>
</mat-card>
