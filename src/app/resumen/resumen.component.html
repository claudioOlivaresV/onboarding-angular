<mat-card class="example-card" appearance="outlined">
  <mat-card-header>
    <mat-card-title-group>
      <mat-card-title>Resumen</mat-card-title>
      <mat-card-subtitle
        >Revisa que todo esté correcto antes de activar tu tarjeta.
      </mat-card-subtitle>
    </mat-card-title-group>
  </mat-card-header>
  <mat-card-content>
    <div class="row">
      <div class="col-6">Nombre</div>
      <div class="col-6">Nombre</div>
    </div>
    <div class="row">
      <div class="col-6">RUT</div>
      <div class="col-6">RUT</div>
    </div>
    <div class="row">
      <div class="col-6">Correo</div>
      <div class="col-6">Correo</div>
    </div>
    <div class="row">
      <div class="col-6">Teléfono</div>
      <div class="col-6">Teléfono</div>
    </div>
    <div class="row">
      <div class="col-6">Región</div>
      <div class="col-6">Región</div>
    </div>
    <div class="row">
      <div class="col-6">Comuna</div>
      <div class="col-6">Comuna</div>
    </div>
    <div class="row">
      <div class="col-6">Dirección</div>
      <div class="col-6">Dirección</div>
    </div>
    <div class="row">
      <div class="col-6">Monto inicial</div>
      <div class="col-6">$10.000</div>
    </div>
    <div class="row">
      <div class="col-6">
        <button mat-stroked-button>Atras</button>
      </div>
      <div class="col-6">
        <button mat-flat-button class="w-100" (click)="activar()">
          Activar Tarjeta
        </button>
      </div>
    </div>
  </mat-card-content>
</mat-card>
